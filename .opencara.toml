version = 1

[review]
prompt = """
Review this pull request for Paradise.ECS — a high-performance Entity Component System
library for .NET 10 with Native AOT support.

Tech stack: C# / .NET 10, Native AOT, source generators, TUnit (test framework).

Focus on:
- Correctness: data corruption, handle safety, thread safety (lock-free CAS, memory barriers)
- Performance: cache efficiency (16KB L1-sized chunks, SoA layout), zero-allocation hot paths,
  unnecessary boxing or allocations, branch misprediction risks
- AOT compatibility: no reflection, no dynamic code generation, no MakeGenericType
- Memory safety: Span<T> lifetime issues, use-after-free on handles, dispose patterns
- Source generator correctness: proper incremental caching, deterministic output
- Test coverage for new/changed code
- Consistency with existing patterns in the codebase

Be concise. Flag real issues, skip nitpicks.
"""
agent_count = 5
preferred_models = ["claude-sonnet-4-6", "gpt-5.4", "glm-5", "kimi-k2.5", "qwen3.5-plus"]
timeout = "10m"

[review.summarizer]
only = "quabug"
preferred_models = ["claude-opus-4-6"]
