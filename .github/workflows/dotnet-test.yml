name: .NET Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore --solution ParadiseEngine.slnx

      - name: Build
        run: dotnet build --solution ParadiseEngine.slnx --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test --solution ParadiseEngine.slnx --no-build -p:PublishAot=false --output normal
