name: .NET Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Cache the downloaded slangc toolchain across runs. Keyed on the manifest SHA so a Slang
      # version bump invalidates the cache automatically; the cache root mirrors RestoreSlang's
      # default ($(NuGetPackageRoot)_slang) which lives under ~/.nuget/packages on Linux runners.
      - name: Cache slangc
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages/_slang
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('tools/slang/slang.manifest.json') }}
          restore-keys: |
            slang-${{ runner.os }}-${{ runner.arch }}-

      - name: Prepare CI solution
        run: |
          cp ParadiseEngine.slnx ParadiseEngine.ci.slnx
          dotnet sln ParadiseEngine.ci.slnx remove \
            src/Paradise.ECS.Concurrent.Test/Paradise.ECS.Concurrent.Test.csproj \
            src/Paradise.ECS.CoyoteTest/Paradise.ECS.CoyoteTest.csproj

      - name: Restore dependencies
        run: dotnet restore ParadiseEngine.ci.slnx

      - name: Build
        run: dotnet build ParadiseEngine.ci.slnx --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test --solution ParadiseEngine.ci.slnx --no-build --output normal
