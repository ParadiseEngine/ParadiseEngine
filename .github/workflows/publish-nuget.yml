name: Publish NuGet packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, for example v1.2.3 or 1.2.3-beta.1"
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  CONFIGURATION: Release
  PACKAGE_OUTPUT_DIR: artifacts/nuget
  NUGET_SOURCE_URL: https://api.nuget.org/v3/index.json

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Paradise.Rendering.Pbr embeds Slang-compiled shaders; cache the slangc toolchain
      # exactly like dotnet-test.yml does (keyed on the manifest so version bumps invalidate).
      - name: Cache slangc
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages/_slang
          key: slang-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('tools/slang/slang.manifest.json') }}
          restore-keys: |
            slang-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve package version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          version="${version#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must look like v1.2.3 or v1.2.3-beta.1"
            exit 1
          fi

          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Resolve NuGet user
        id: nuget-user
        shell: bash
        run: |
          user="${{ vars.NUGET_USER || github.repository_owner }}"

          if [[ -z "$user" ]]; then
            echo "::error::Set the NUGET_USER repository variable to your nuget.org username."
            exit 1
          fi

          echo "value=$user" >> "$GITHUB_OUTPUT"

      # Every packable library in src/. Listed in rough dependency order so incremental
      # builds reuse shared ProjectReference outputs. Source generators are not published
      # standalone: Paradise.BT.Generators ships inside Paradise.BT, Paradise.ECS.Generators
      # inside Paradise.ECS (analyzers/dotnet/cs).
      - name: Pack all packages
        shell: bash
        run: |
          projects=(
            Paradise.BLOB
            Paradise.BT
            Paradise.BT.Builder
            Paradise.BT.Nodes
            Paradise.ECS
            Paradise.ECS.Tag
            Paradise.ECS.Concurrent
            Paradise.ECS.Jobs
            Paradise.Physics
            Paradise.Rendering
            Paradise.Rendering.WebGPU
            Paradise.Assets.Gltf
            Paradise.Assets.Textures
            Paradise.Rendering.Pbr
            Paradise.Ui.ImGui
            Paradise.Ui.Noesis
          )

          for project in "${projects[@]}"; do
            dotnet pack "src/$project/$project.csproj" \
              -c "$CONFIGURATION" \
              -o "$PACKAGE_OUTPUT_DIR" \
              -p:ContinuousIntegrationBuild=true \
              -p:Version="$PACKAGE_VERSION"
          done

          count=$(ls "$PACKAGE_OUTPUT_DIR"/*.nupkg | wc -l)
          if [[ "$count" -ne "${#projects[@]}" ]]; then
            echo "::error::Expected ${#projects[@]} packages, found $count"
            exit 1
          fi

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ steps.nuget-user.outputs.value }}

      - name: Publish to NuGet
        run: >
          dotnet nuget push "${{ env.PACKAGE_OUTPUT_DIR }}/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source "${{ env.NUGET_SOURCE_URL }}"
          --skip-duplicate
